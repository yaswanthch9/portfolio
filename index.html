<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow — Task Manager</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
</head>
<body>
  <div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="logo">Task<span>Flow</span></div>
      <nav class="sidebar-nav">
        <button class="nav-btn active" data-filter="all">📋 All Tasks</button>
        <button class="nav-btn" data-filter="todo">⭕ To Do</button>
        <button class="nav-btn" data-filter="inprogress">🔄 In Progress</button>
        <button class="nav-btn" data-filter="done">✅ Done</button>
      </nav>
      <div class="sidebar-stats">
        <div class="stat"><span id="stat-total">0</span><label>Total</label></div>
        <div class="stat"><span id="stat-done">0</span><label>Done</label></div>
        <div class="stat"><span id="stat-pending">0</span><label>Pending</label></div>
      </div>
      <div class="progress-section">
        <label class="mono">Overall Progress</label>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <span class="mono" id="progress-text">0%</span>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main">
      <header class="top-bar">
        <div>
          <h1 id="view-title">All Tasks</h1>
          <p class="date mono" id="today-date"></p>
        </div>
        <button class="add-btn" id="open-modal">+ Add Task</button>
      </header>

      <!-- FILTERS -->
      <div class="filter-bar">
        <input type="text" class="search" id="search" placeholder="🔍 Search tasks..."/>
        <div class="priority-filters">
          <button class="pf-btn active" data-priority="all">All</button>
          <button class="pf-btn" data-priority="high">🔴 High</button>
          <button class="pf-btn" data-priority="medium">🟡 Medium</button>
          <button class="pf-btn" data-priority="low">🟢 Low</button>
        </div>
      </div>

      <!-- KANBAN BOARD -->
      <div class="board" id="board">
        <div class="column" id="col-todo">
          <div class="col-header"><span class="col-dot todo-dot"></span>To Do <span class="col-count" id="count-todo">0</span></div>
          <div class="col-body droppable" data-status="todo"></div>
        </div>
        <div class="column" id="col-inprogress">
          <div class="col-header"><span class="col-dot progress-dot"></span>In Progress <span class="col-count" id="count-inprogress">0</span></div>
          <div class="col-body droppable" data-status="inprogress"></div>
        </div>
        <div class="column" id="col-done">
          <div class="col-header"><span class="col-dot done-dot"></span>Done <span class="col-count" id="count-done">0</span></div>
          <div class="col-body droppable" data-status="done"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2>Add New Task</h2>
        <button class="close-btn" id="close-modal">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Task Title *</label>
          <input type="text" id="task-title" placeholder="e.g. Design landing page"/>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="task-desc" placeholder="Add more details..."></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Priority</label>
            <select id="task-priority">
              <option value="high">🔴 High</option>
              <option value="medium" selected>🟡 Medium</option>
              <option value="low">🟢 Low</option>
            </select>
          </div>
          <div class="form-group">
            <label>Status</label>
            <select id="task-status">
              <option value="todo">⭕ To Do</option>
              <option value="inprogress">🔄 In Progress</option>
              <option value="done">✅ Done</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Due Date</label>
          <input type="date" id="task-due"/>
        </div>
        <button class="submit-btn" id="submit-task">Add Task</button>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
